name: CI

on:
  push:
    branches: [main, master, "17.0"]
  pull_request:
    branches: [main, master, "17.0"]

jobs:
  pre-commit:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: pre-commit/action@v3.0.1

  test:
    name: Tests (Odoo 17.0)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: odoo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # 3.11: Odoo 17 pins gevent 22.10.2 here (has wheels); the 3.10 pin
      # (gevent 21.8.0) has no cp310 wheels and fails to build from source.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-odoo17-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Install Odoo
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libldap2-dev libsasl2-dev libpq-dev
          git clone --depth 1 --branch 17.0 https://github.com/odoo/odoo.git /tmp/odoo
          pip install -r /tmp/odoo/requirements.txt
          pip install -e /tmp/odoo
          pip install pytest-odoo pytest-cov coverage

      # datev_connector_payroll is excluded: it depends on hr_payroll
      # (Odoo Enterprise), which is not available in this community CI.
      - name: Initialize database
        env:
          PGUSER: odoo
          PGPASSWORD: odoo
          PGHOST: localhost
        run: |
          odoo -d odoo_test \
            --addons-path=/tmp/odoo/addons,. \
            -i datev_connector,datev_connector_accounting,datev_connector_hr \
            --stop-after-init --no-http

      # pytest-odoo connects as the OS user regardless of PGUSER/config, so a
      # matching superuser role is the robust fix.
      - name: Create PG role for runner user
        run: |
          PGPASSWORD=odoo psql -h localhost -U odoo -d odoo_test \
            -c "CREATE ROLE runner LOGIN SUPERUSER PASSWORD 'odoo'"

      - name: Run tests
        env:
          ODOO_RC: /tmp/odoo-ci.conf
          PGPASSWORD: odoo
        run: |
          printf '[options]\ndb_host = localhost\ndb_port = 5432\ndb_user = odoo\ndb_password = odoo\naddons_path = /tmp/odoo/addons,.\n' > /tmp/odoo-ci.conf
          python -m pytest \
            --odoo-database=odoo_test \
            --cov=. \
            --cov-report=xml \
            datev_connector/tests/ \
            datev_connector_accounting/tests/ \
            datev_connector_hr/tests/
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
