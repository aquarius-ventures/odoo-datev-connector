name: CI

on:
  push:
    branches: [main, master, "17.0"]
  pull_request:
    branches: [main, master, "17.0"]

jobs:
  pre-commit:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: pre-commit/action@v3.0.1

  test:
    name: Tests (Odoo 17.0)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: odoo_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}

      - name: Install Odoo
        run: |
          pip install -r https://raw.githubusercontent.com/odoo/odoo/17.0/requirements.txt
          pip install odoo==17.0.post20241201  # pinned build
          pip install pytest-odoo coverage

      - name: Run tests
        env:
          PGUSER: odoo
          PGPASSWORD: odoo
          PGHOST: localhost
        run: |
          python -m pytest \
            --odoo-database=odoo_test \
            --odoo-addons-path=. \
            --cov=. \
            --cov-report=xml \
            datev_connector/tests/ \
            datev_connector_accounting/tests/ \
            datev_connector_payroll/tests/

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
